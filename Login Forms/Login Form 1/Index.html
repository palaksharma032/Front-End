<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="page-shell">
        <section class="login-card" aria-labelledby="login-title">
            <div class="login-art" aria-hidden="true">
                <div class="orb orb-one"></div>
                <div class="orb orb-two"></div>
                <div class="login-art-copy">
                    <p class="welcome">Welcome back</p>
                    <h1>Sign in to continue</h1>
                </div>
            </div>

            <div class="login-panel">
                <div class="title-block">
                    <p class="welcome">Login Form</p>
                    <h2 id="login-title">Hello again</h2>
                    <p>Enter your details below to get started.</p>
                </div>

                <form action="#" class="login-form">
                    <label class="field">
                        <span>Email or Phone</span>
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">@</span>
                            <input type="text" name="identifier" placeholder="Enter your email or phone" autocomplete="username" required />
                        </div>
                    </label>

                    <label class="field">
                        <span>Password</span>
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">*</span>
                            <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
                        </div>
                    </label>

                    <div class="form-row">
                        <label class="remember-me">
                            <input type="checkbox" name="remember" />
                            <span>Remember me</span>
                        </label>
                        <a class="forgot-link" href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-button">Login</button>
                </form>

                <p class="signup-link">Not a member? <a href="#">Sign up now</a></p>
            </div>
        </section>
    </main>
</body>
</html>
