<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flipping Card</title>
        <link rel="stylesheet" href="flipping_card.css" />
    </head>
    <body>
        <section>
            <div class="container">
                <div class="card front-face">
                    <header>
                        <span class="logo">
                            <img src="Assets/logo.png" alt="Mastercard logo" />
                            <h5>Master Card</h5>
                        </span>
                        <img class="chip" src="Assets/chip.png" alt="Card chip" />
                    </header>

                    <div class="card-details">
                        <div class="name-number">
                            <h6>Card Number</h6>
                            <h5 class="number">5234 5678 9012 3456</h5>
                            <h5 class="name">Karen</h5>
                        </div>

                        <div class="valid-date">
                            <h6>Valid Thru</h6>
                            <h5>07/29</h5>
                        </div>
                    </div>
                </div>
                <div class="card back-face">
                    <h6>
                        For customer service call +91 XXXXXXXXXX or email at mastercard123@gmail.com
                    </h6>
                    <span class="magnetic-strip"></span>
                    <div class="signature"><i>023</i></div>
                    <h5>
                        This card is the property of the issuer and must be returned upon request.
                        Use of this card is subject to the terms and conditions of the agreement.
                    </h5>
                </div>
            </div>
        </section>
    </body>
</html>
