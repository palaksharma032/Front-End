<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Sidebar Menu</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <link rel="stylesheet" href="https://v2.boxicons.com/css/boxicons.min.css">
    </head>
    <body>
        <div class="main_box">
            <input type="checkbox" id="check">
            <label for="check" class="toggle_btn" aria-label="Toggle menu">
                <span class="bar bar1"></span>
                <span class="bar bar2"></span>
                <span class="bar bar3"></span>
            </label>

            <div class="sidebar_menu">
                <div class="logo">
                    <a href="#">Whimsycore</a>
                </div>

                <ul class="menu">
                    <li><a href="#"><i class="fas fa-qrcode"></i><span>Dashboard</span></a></li>
                    <li><a href="#"><i class="fas fa-link"></i><span>Shortcuts</span></a></li>
                    <li><a href="#"><i class="fas fa-stream"></i><span>Overview</span></a></li>
                    <li><a href="#"><i class="fas fa-comment"></i><span>Events</span></a></li>
                    <li><a href="#"><i class="fas fa-calendar-week"></i><span>About</span></a></li>
                    <li><a href="#"><i class="fas fa-sliders-h"></i><span>Services</span></a></li>
                    <li><a href="#"><i class="fas fa-phone-volume"></i><span>Contact</span></a></li>
                    <li><a href="#"><i class="fas fa-comments"></i><span>Feedback</span></a></li>
                </ul>

                <div class="social_media">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </div>
    </body>
</html>
